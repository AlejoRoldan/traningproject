version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: training-platform-db
    environment:
      POSTGRES_USER: ${DB_USER:-training_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-training_password}
      POSTGRES_DB: ${DB_NAME:-training_platform}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=es_PY.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-training_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - training-platform-network
    restart: unless-stopped

  # Redis for Session Management & Caching
  redis:
    image: redis:7-alpine
    container_name: training-platform-cache
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_password}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - training-platform-network
    restart: unless-stopped

  # NestJS Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        NODE_VERSION: 22.13.0
    container_name: training-platform-api
    environment:
      # Node & Environment
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3001}

      # Database
      DATABASE_URL: postgresql://${DB_USER:-training_user}:${DB_PASSWORD:-training_password}@postgres:5432/${DB_NAME:-training_platform}
      DB_SHADOW_DATABASE_URL: postgresql://${DB_USER:-training_user}:${DB_PASSWORD:-training_password}@postgres:5432/${DB_NAME:-training_platform}_shadow

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0

      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_ORGANIZATION_ID: ${OPENAI_ORGANIZATION_ID}

      # External Services
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      VAPI_API_KEY: ${VAPI_API_KEY}

      # AWS S3
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-training-platform-audio}

      # Security & CORS
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app/server
      - ./shared:/app/shared
      - ./prisma:/app/prisma
      - /app/node_modules
    ports:
      - "${PORT:-3001}:3001"
    networks:
      - training-platform-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3001}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NODE_VERSION: 22.13.0
    container_name: training-platform-web
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://backend:3001}
      VITE_WS_URL: ${VITE_WS_URL:-ws://backend:3001}
      VITE_OPENAI_API_KEY: ${VITE_OPENAI_API_KEY}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      - backend
    volumes:
      - ./client:/app/client
      - ./shared:/app/shared
      - /app/client/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - training-platform-network
    restart: unless-stopped

  # PgAdmin for Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: training-platform-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@training-platform.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_PROXY_X_FOR_COUNT: 1
      PGADMIN_CONFIG_PROXY_X_PROTO_COUNT: 1
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: 1
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - training-platform-network
    restart: unless-stopped
    depends_on:
      - postgres

  # Mailhog for Email Testing (Development)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: training-platform-mailhog
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - training-platform-network
    restart: unless-stopped
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  training-platform-network:
    driver: bridge
